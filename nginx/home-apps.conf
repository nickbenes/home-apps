# nginx reverse proxy config for home-apps on pace-bene.
#
# Setup (run once, requires sudo):
#   sudo apt install nginx
#   sudo cp /home/nickbenes/dev/home-apps/nginx/home-apps.conf /etc/nginx/sites-available/home-apps
#   sudo ln -s /etc/nginx/sites-available/home-apps /etc/nginx/sites-enabled/home-apps
#   sudo rm -f /etc/nginx/sites-enabled/default   # remove default site
#   sudo nginx -t                                  # test config
#   sudo systemctl enable --now nginx
#
# After switching systemd service from benes-finance to finance:
#   systemctl --user stop benes-finance
#   systemctl --user disable benes-finance
#   systemctl --user start finance
#
# Reload nginx after config changes: sudo nginx -s reload
#
# Access via Tailscale: http://pace-bene/
# Access locally:       http://localhost/

server {
    listen 80;
    server_name _;

    # Landing page — served directly as a static file (no Node process)
    location = / {
        root  /home/nickbenes/dev/home-apps/public/home;
        index index.html;
    }

    # Finance — port 3001
    location /finance {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Todos — port 3000
    location /todos {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Calendar — port 3002 (enable when service is running)
    location /calendar {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Food — port 3003 (enable when service is running)
    location /food {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
