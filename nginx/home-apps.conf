# nginx reverse proxy config for home-apps on pace-bene.
#
# Setup (run once, requires sudo):
#   sudo apt install nginx
#   sudo cp /home/nickbenes/dev/home-apps/nginx/home-apps.conf /etc/nginx/sites-available/home-apps
#   sudo ln -s /etc/nginx/sites-available/home-apps /etc/nginx/sites-enabled/home-apps
#   sudo rm -f /etc/nginx/sites-enabled/default   # remove default site
#   sudo nginx -t                                  # test config
#   sudo systemctl enable --now nginx
#
# After switching systemd service from benes-finance to finance:
#   systemctl --user stop benes-finance
#   systemctl --user disable benes-finance
#   systemctl --user start finance
#
# Reload nginx after config changes: sudo nginx -s reload
#
# Access via Tailscale: http://pace-bene/
# Access locally:       http://localhost/

server {
    listen 80;
    server_name _;

    # Landing page — served directly as a static file (no Node process)
    # straight out of this repo. /home/nickbenes is 750 (no "other"
    # traversal), so nginx (running as www-data) needs a one-time ACL grant
    # to read through the path — NOT a chmod on the home directory itself,
    # which would open it to every user/process on the box, not just nginx:
    #   sudo setfacl -m u:www-data:x /home/nickbenes
    #   sudo setfacl -m u:www-data:x /home/nickbenes/dev
    #   sudo setfacl -m u:www-data:x /home/nickbenes/dev/home-apps
    #   sudo setfacl -m u:www-data:x /home/nickbenes/dev/home-apps/public
    #   sudo setfacl -m u:www-data:x /home/nickbenes/dev/home-apps/public/home
    #   sudo setfacl -m u:www-data:r /home/nickbenes/dev/home-apps/public/home/index.html
    # If you add more files under public/home/ later, each new file needs
    # its own `setfacl -m u:www-data:r` grant (the directory-level ACLs
    # above only cover traversal, not automatic read access to new files).
    #
    # IMPORTANT nginx gotcha: a bare "GET /" gets internally redirected by
    # the index module to "/index.html" and RE-MATCHED against location
    # blocks — it does NOT just reuse the "location = /" block's root. Both
    # blocks below are required; dropping the /index.html one silently falls
    # through to nginx's compiled-in default doc root (no error logged, just
    # the wrong content) since nothing else matches "/index.html".
    location = / {
        root  /home/nickbenes/dev/home-apps/public/home;
        index index.html;
    }

    location = /index.html {
        root  /home/nickbenes/dev/home-apps/public/home;
    }

    # Finance — port 3001
    location /finance {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Todos — port 3000
    location /todos {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Calendar — port 3002 (enable when service is running)
    location /calendar {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Food — port 3003 (enable when service is running)
    location /food {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Dashboard — port 3004
    location /dashboard {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
